<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aida Samzargar | Graphic Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060606;
      --surface: #101010;
      --text: #f3f3f3;
      --muted: #a3a3a3;
      --line: rgba(255, 255, 255, 0.09);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
    }

    .page {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: 28px 0 60px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 70px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    .nav-left {
      display: flex;
      gap: 24px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand {
      font-size: 34px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.02em;
      max-width: 680px;
      margin: 0 auto 70px;
    }

    .helper {
      text-align: center;
      color: var(--muted);
      margin-top: 12px;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .project-card {
      border: 1px solid var(--line);
      background: var(--surface);
      overflow: hidden;
      border-radius: 16px;
      transition: transform 0.25s ease, border-color 0.25s ease;
      cursor: pointer;
      color: inherit;
      text-decoration: none;
    }

    .project-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .project-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .project-card .name {
      padding: 14px 14px 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #e5e5e5;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.84);
      z-index: 1000;
      padding: 28px;
    }

    .modal.open {
      display: flex;
    }

    .modal-inner {
      width: min(980px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #0c0c0c;
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #0c0c0c;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #e5e5e5;
    }

    .close-btn {
      border: 1px solid var(--line);
      background: #171717;
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 11px;
      cursor: pointer;
      border-radius: 8px;
    }

    .modal-image {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 800px) {
      .brand {
        font-size: 28px;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }

      .project-card img {
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="nav">
      <div class="nav-left">
        <span>Work</span>
        <span>Contact</span>
      </div>
    </header>

    <h1 class="brand">Hi!, I am Aida Samzargar. I'm a Graphic Designer based in Montreal, Canada.</h1>
    <p class="helper">Click a project image to open full details.</p>

    <section class="projects-grid">
      <button class="project-card" data-title="Lume" data-image="Lume.jpg" aria-label="Open Lume details">
        <img src="Lume.jpg" alt="Lume project preview" />
        <div class="name">Lume</div>
      </button>

      <button class="project-card" data-title="Vela Shades" data-image="Vela shades final.jpg" aria-label="Open Vela Shades details">
        <img src="Vela shades final.jpg" alt="Vela Shades project preview" />
        <div class="name">Vela Shades</div>
      </button>
    </section>
  </main>

  <div class="modal" id="projectModal" aria-hidden="true">
    <div class="modal-inner">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle"></div>
        <button class="close-btn" id="closeModal" type="button">Close</button>
      </div>
      <img class="modal-image" id="modalImage" src="" alt="" />
    </div>
  </div>

  <script>
    const modal = document.getElementById("projectModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalImage = document.getElementById("modalImage");
    const closeModal = document.getElementById("closeModal");
    const cards = document.querySelectorAll(".project-card");

    cards.forEach((card) => {
      card.addEventListener("click", () => {
        const title = card.dataset.title;
        const image = card.dataset.image;

        modalTitle.textContent = title;
        modalImage.src = image;
        modalImage.alt = title + " full project details";
        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
      });
    });

    const closeProjectModal = () => {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      modalImage.src = "";
      modalImage.alt = "";
    };

    closeModal.addEventListener("click", closeProjectModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeProjectModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("open")) {
        closeProjectModal();
      }
    });
  </script>
</body>
</html>
